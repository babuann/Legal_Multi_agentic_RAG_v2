services:
  ingest:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data:ro
      - ./chroma_db:/app/chroma_db
    command: ["python", "ingest.py"]

  rag-pipeline:
    build: .
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./chroma_db:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
